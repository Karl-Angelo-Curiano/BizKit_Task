<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Equipment Rental</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; color: #1a1a1a; }
    h1 { font-size: 1.4rem; }
    label { display: block; margin: 12px 0 4px; font-weight: 600; font-size: 0.9rem; }
    select, input { width: 100%; padding: 8px; font-size: 1rem; box-sizing: border-box; }
    button { margin-top: 16px; padding: 10px 16px; font-size: 1rem; cursor: pointer; }
    .total { margin-top: 16px; font-size: 1.2rem; font-weight: 700; }
    .message { margin-top: 16px; padding: 10px; border-radius: 6px; }
    .ok { background: #e6f4ea; color: #1e7e34; }
    .err { background: #fdecea; color: #c0392b; }

    /* Modal styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.4);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background-color: #fff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      max-width: 400px;
      text-align: center;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
      color: #999;
    }

    .modal-close:hover {
      color: #000;
    }

    .modal-btn {
      background-color: #007bff;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 15px;
      font-size: 16px;
    }

    .modal-btn:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <h1>Book Equipment</h1>

  <label for="equipment">Equipment</label>
  <select id="equipment"></select>

  <label for="customer">Customer name</label>
  <input id="customer" type="text" placeholder="e.g. Jane Doe" />

  <label for="from">Start date</label>
  <input id="from" type="date" />

  <label for="to">End date</label>
  <input id="to" type="date" />

  <div class="total" id="total">Total: PHP 0.00</div>

  <button id="book">Create booking</button>

  <div id="message"></div>


  <!-- Bootstrap modal for equipment removed -->
  <div id="equipmentRemovedModal" class="modal">
    <div class="modal-content">
      <span class="modal-close">&times;</span>
      <h2>Equipment No Longer Available</h2>
      <p>The equipment you previously selected is no longer available. Please select a different item.</p>
      <button class="modal-btn" onclick="document.getElementById('equipmentRemovedModal').style.display='none'">OK</button>
    </div>
  </div>

  <script>
    let equipmentList = [];

    function showRemovedModal() {
      const modal = document.getElementById("equipmentRemovedModal");
      modal.style.display = "flex";
      
      const closeBtn = document.querySelector(".modal-close");
      closeBtn.onclick = () => {
        modal.style.display = "none";
      };
      
      // Close when clicking outside the modal
      window.onclick = (event) => {
        if (event.target === modal) {
          modal.style.display = "none";
        }
      };
    }
    async function loadAgainEquipment() {
      const from = document.getElementById("from").value;
      const to = document.getElementById("to").value;

      if (!from || !to) {
          //await loadEquipment();   // restore all equipment
          return;
      }

      const res = await fetch(`/api/availability?from=${from}&to=${to}`);
      equipmentList = await res.json();

      const select = document.getElementById("equipment");
      const selected = select.value;
      
      let hasbeenRemoved = true;
      equipmentList.forEach(item => {
        if (item.id == selected) {
          hasbeenRemoved = false;
          console.log(item.id, selected);
        }
      });
      if(hasbeenRemoved) {
        select.selectedIndex = null;
        showRemovedModal(); // Show modal when equipment is removed
      }
      console.log(hasbeenRemoved);
      select.innerHTML = "";

      equipmentList.forEach(item => {
          const opt = document.createElement("option");
          opt.value = item.id;
          opt.textContent = `${item.name} (PHP ${item.daily_rate}/day)`;
          select.appendChild(opt);
      });

      updateTotal();
  }

    async function loadEquipment() {
      const res = await fetch("/api/equipment");
      equipmentList = await res.json();
      const select = document.getElementById("equipment");

      const today = new Date();
      const localDate = today.getFullYear() + '-' +
          String(today.getMonth() + 1).padStart(2, '0') + '-' +
          String(today.getDate()).padStart(2, '0');
      const dateTo = document.getElementById("to");
      const dateFrom = document.getElementById("from");
      dateFrom.min = localDate;
      dateTo.min = localDate;

      select.innerHTML = "";
      equipmentList.forEach(item => {
        const opt = document.createElement("option");
        opt.value = item.id;
        opt.textContent = `${item.name} (PHP ${item.daily_rate}/day)`;
        select.appendChild(opt);
      });
      
    }

    function selectedEquipment() {
      const id = Number(document.getElementById("equipment").value);
      return equipmentList.find(e => e.id === id);
    }

    function dayCount(from, to) {
      // Rentals are billed inclusively: both start and end day count.
      const ms = new Date(to) - new Date(from);
      return Math.round(ms / (1000 * 60 * 60 * 24)) + 1;
    }

    function updateTotal() {
      const equipment = selectedEquipment();
      const from = document.getElementById("from").value;
      const to = document.getElementById("to").value;
      const totalEl = document.getElementById("total");

      if (!equipment || !from || !to) {
        totalEl.textContent = "Total: PHP 0.00";
        return;
      }
      const days = dayCount(from, to);
      if (days < 1) {
        totalEl.textContent = "Total: PHP 0.00";
        return;
      }
      const total = equipment.daily_rate * days;
      totalEl.textContent = `Total: PHP ${total.toFixed(2)} (${days} day${days > 1 ? "s" : ""})`;
    }

    async function createBooking() {
      const messageEl = document.getElementById("message");
      messageEl.className = "";
      messageEl.textContent = "";

      const body = {
        equipment_id: Number(document.getElementById("equipment").value),
        customer: document.getElementById("customer").value,
        from_date: document.getElementById("from").value,
        to_date: document.getElementById("to").value,
      };

      const res = await fetch("/api/bookings", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await res.json();

      if (res.ok) {
        messageEl.className = "message ok";
        messageEl.textContent = `Booked! Total PHP ${data.total.toFixed(2)}.`;
      } else {
        messageEl.className = "message err";
        messageEl.textContent = data.error;
      }
    }
    loadEquipment();
    document.getElementById("equipment").addEventListener("change", updateTotal);
    document.getElementById("from").addEventListener("change", updateTotal);
    document.getElementById("to").addEventListener("change", updateTotal);
    document.getElementById("from").addEventListener("change", loadAgainEquipment);
    document.getElementById("to").addEventListener("change", loadAgainEquipment);
    document.getElementById("book").addEventListener("click", createBooking);
    
    
  </script>
</body>
</html>
